<!DOCTYPE html>
<html lang="fa">
<head>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

        <h1>زامیتک</h1>

    <main>
        <h1 class="page-title">راه‌های ارتباطی</h1>

            <div class="card contact-card">
                <div class="contact-icon">📧</div>

            </div>
            
            <div class="card contact-card">

                <p>۰۹۱۲-XXX-XXXX</p>
                <a href="tel:+98912XXXXXXX" class="button">تماس تلفنی</a>
            </div>
            
            <div class="card contact-card">
                <div class="contact-icon">🗺️</div>
                <h2>آدرس</h2>
                <p>تهران، خیابان آزادی، دانشگاه تهران، مرکز رشد</p>
                <a href="https://maps.google.com" target="_blank" class="button">مشاهده در نقشه</a>
